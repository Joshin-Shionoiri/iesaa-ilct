<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ILCT 受験者ポータル｜ログイン</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin:0;
    font-family:"Yu Gothic", Arial, sans-serif;
    background:#f5f7fb;
  }

  .login-box {
    max-width:420px;
    margin:80px auto;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
  }

  h2 {
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
    color:#004b9b;
  }

  label {
    font-size:18px;
    display:block;
    margin-bottom:8px;
  }

  input {
    width:100%;
    padding:14px;
    font-size:18px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
  }

  .login-btn {
    width:100%;
    padding:14px;
    background:#004b9b;
    color:#fff;
    font-size:20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
  }

  .login-btn:hover {
    background:#0060d0;
  }

  .links {
    text-align:center;
    margin-top:20px;
    font-size:16px;
  }

  .links a {
    color:#004b9b;
    text-decoration:none;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2>ILCT 受験者ポータル</h2>

  <form action="dashboard.html">
    <label>メールアドレス</label>
    <input type="email" required>

    <label>パスワード</label>
    <input type="password" required>

    <button class="login-btn">ログイン</button>
  </form>

  <div class="links">
    <a href="signup.html">新規登録はこちら</a><br><br>
    <a href="reset.html">パスワードを忘れた方</a>
  </div>
</div>

</body>
</html>

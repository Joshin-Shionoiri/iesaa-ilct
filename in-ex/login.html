<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ILCT 受験者ポータル｜ログイン</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family:"Yu Gothic"; background:#f5f7fb; margin:0; }
  .box { max-width:420px; margin:80px auto; background:#fff; padding:40px;
         border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15); }
  h2 { text-align:center; color:#004b9b; margin-bottom:30px; }
  label { font-size:18px; margin-bottom:8px; display:block; }
  input { width:100%; padding:14px; font-size:18px; margin-bottom:20px;
          border:1px solid #ccc; border-radius:8px; }
  button { width:100%; padding:14px; background:#004b9b; color:#fff;
           font-size:20px; border:none; border-radius:8px; cursor:pointer; margin-bottom:20px; }
  .google-btn { background:#fff; color:#444; border:1px solid #ccc; }
  .github-btn { background:#333; color:#fff; }
  .yahoo-btn { background:#6001d2; color:#fff; }
  .anon-btn { background:#555; color:#fff; }
  a { display:block; text-align:center; margin-top:10px; color:#004b9b; }
</style>
</head>
<body>

<div class="box">
  <h2>ログイン</h2>

  <label>メールアドレス</label>
  <input id="email" type="email">

  <label>パスワード</label>
  <input id="password" type="password">

  <button id="loginBtn">ログイン</button>

  <!-- ▼ OAuth ログイン -->
  <button class="google-btn" id="googleLoginBtn">Googleでログイン</button>
  <button class="github-btn" id="githubLoginBtn">GitHubでログイン</button>
  <button class="yahoo-btn" id="yahooLoginBtn">Yahoo!でログイン</button>
  <button class="anon-btn" id="anonLoginBtn">匿名ログイン（テスト用）</button>

  <a href="signup.html">新規登録はこちら</a>
  <a href="reset-password.html">パスワードを忘れた方はこちら</a>
</div>

<script type="module">
  import { auth } from "./firebase.js";
  import { 
    signInWithEmailAndPassword, 
    GoogleAuthProvider,
    GithubAuthProvider,
    OAuthProvider,
    signInWithPopup,
    signInAnonymously,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  /* ▼ メールログイン */
  document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";
    } catch (error) {
      alert("ログインエラー: " + error.message);
    }
  };

  /* ▼ Googleログイン */
  document.getElementById("googleLoginBtn").onclick = async () => {
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
      window.location.href = "dashboard.html";
    } catch (error) {
      alert("Googleログインエラー: " + error.message);
    }
  };

  /* ▼ GitHubログイン */
  document.getElementById("githubLoginBtn").onclick = async () => {
    const provider = new GithubAuthProvider();
    try {
      await signInWithPopup(auth, provider);
      window.location.href = "dashboard.html";
    } catch (error) {
      alert("GitHubログインエラー: " + error.message);
    }
  };

  /* ▼ Yahooログイン */
  document.getElementById("yahooLoginBtn").onclick = async () => {
    const provider = new OAuthProvider('yahoo.com');
    try {
      await signInWithPopup(auth, provider);
      window.location.href = "dashboard.html";
    } catch (error) {
      alert("Yahooログインエラー: " + error.message);
    }
  };

  /* ▼ 匿名ログイン（テスト用） */
  document.getElementById("anonLoginBtn").onclick = async () => {
    try {
      await signInAnonymously(auth);
      window.location.href = "dashboard.html";
    } catch (error) {
      alert("匿名ログインエラー: " + error.message);
    }
  };

  /* ▼ ログイン後の共通処理 */
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // すでにログインしている場合は自動でダッシュボードへ
      window.location.href = "dashboard.html";
    }
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>新規登録｜ILCT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family:"Yu Gothic"; background:#eef2f7; margin:0; }
  .box {
    max-width:500px; margin:80px auto; background:#fff; padding:40px;
    border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15);
  }
  h2 { text-align:center; margin-bottom:30px; }
  input {
    width:100%; padding:14px; margin-bottom:20px;
    font-size:18px; border:1px solid #ccc; border-radius:8px;
  }
  button {
    width:100%; padding:14px; background:#004b9b; color:#fff;
    font-size:20px; border:none; border-radius:8px; cursor:pointer;
    margin-bottom:15px;
  }
  button:hover { background:#003b7a; }
  .google-btn { background:#fff; color:#444; border:1px solid #ccc; }
  .github-btn { background:#333; color:#fff; }
  .yahoo-btn { background:#6001d2; color:#fff; }
  .anon-btn { background:#555; color:#fff; }
</style>
</head>
<body>

<div class="box">
  <h2>新規登録（ILCT 受験者）</h2>

  <!-- ▼ メール登録 -->
  <input id="name" placeholder="氏名">
  <input id="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード（6文字以上）">
  <button id="signupBtn">メールで登録</button>

  <hr style="margin:30px 0;">

  <!-- ▼ 電話番号登録 -->
  <input id="phone" placeholder="電話番号（例：09012345678）">
  <button id="smsBtn">SMSコード送信</button>
  <div id="recaptcha-container"></div>

  <input id="smsCode" placeholder="SMS認証コード">
  <button id="verifyBtn">電話番号で登録</button>

  <hr style="margin:30px 0;">

  <!-- ▼ OAuth 登録 -->
  <button class="google-btn" id="googleSignupBtn">Googleで登録</button>
  <button class="github-btn" id="githubSignupBtn">GitHubで登録</button>
  <button class="yahoo-btn" id="yahooSignupBtn">Yahoo!で登録</button>
  <button class="anon-btn" id="anonSignupBtn">匿名登録（テスト用）</button>
</div>

<script type="module">
  import { auth, db } from "./firebase.js";
  import {
    createUserWithEmailAndPassword,
    updateProfile,
    RecaptchaVerifier,
    signInWithPhoneNumber,
    GoogleAuthProvider,
    GithubAuthProvider,
    OAuthProvider,
    signInWithPopup,
    signInAnonymously,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  /* ▼ reCAPTCHA */
  const appVerifier = new RecaptchaVerifier(auth, "recaptcha-container");

  /* ▼ メール登録 */
  document.getElementById("signupBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await updateProfile(user, { displayName: name });

      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        name,
        email,
        created_at: new Date()
      });

      window.location.href = "dashboard.html";
    } catch (error) {
      alert("登録エラー: " + error.message);
    }
  };

  /* ▼ SMSコード送信 */
  let confirmationResult;

  document.getElementById("smsBtn").onclick = async () => {
    const phone = "+81" + document.getElementById("phone").value.slice(1);

    try {
      confirmationResult = await signInWithPhoneNumber(auth, phone, appVerifier);
      alert("SMSコードを送信しました");
    } catch (error) {
      alert("SMS送信エラー: " + error.message);
    }
  };

  /* ▼ 電話番号登録 */
  document.getElementById("verifyBtn").onclick = async () => {
    const code = document.getElementById("smsCode").value;

    try {
      const result = await confirmationResult.confirm(code);
      const user = result.user;

      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        phone: user.phoneNumber,
        created_at: new Date()
      });

      window.location.href = "dashboard.html";
    } catch (error) {
      alert("電話番号登録エラー: " + error.message);
    }
  };

  /* ▼ Google登録 */
  document.getElementById("googleSignupBtn").onclick = async () => {
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      alert("Google登録エラー: " + error.message);
    }
  };

  /* ▼ GitHub登録 */
  document.getElementById("githubSignupBtn").onclick = async () => {
    const provider = new GithubAuthProvider();
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      alert("GitHub登録エラー: " + error.message);
    }
  };

  /* ▼ Yahoo登録 */
  document.getElementById("yahooSignupBtn").onclick = async () => {
    const provider = new OAuthProvider('yahoo.com');
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      alert("Yahoo登録エラー: " + error.message);
    }
  };

  /* ▼ 匿名登録 */
  document.getElementById("anonSignupBtn").onclick = async () => {
    try {
      await signInAnonymously(auth);
    } catch (error) {
      alert("匿名登録エラー: " + error.message);
    }
  };

  /* ▼ ログイン後共通処理 */
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        name: user.displayName || null,
        email: user.email || null,
        phone: user.phoneNumber || null,
        provider: user.providerData[0].providerId,
        created_at: new Date()
      }, { merge: true });

      window.location.href = "dashboard.html";
    }
  });
</script>

</body>
</html>

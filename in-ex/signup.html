<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ILCT 新規登録</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family:"Yu Gothic"; background:#eef2f7; margin:0; }
  .box { max-width:500px; margin:80px auto; background:#fff; padding:40px;
         border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15); }
  input { width:100%; padding:14px; margin-bottom:20px; font-size:18px; }
  button { width:100%; padding:14px; background:#004b9b; color:#fff;
           font-size:20px; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="box">
  <h2>新規登録（ILCT 受験者）</h2>

  <input id="name" placeholder="氏名">
  <input id="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード（6文字以上）">

  <button id="signupBtn">登録する</button>
</div>

<script type="module">
  import { auth, db } from "./firebase.js";
  import { createUserWithEmailAndPassword, updateProfile }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { doc, setDoc }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  document.getElementById("signupBtn").onclick = async () => {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      // Firebase Auth に登録
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // displayName を設定
      await updateProfile(user, { displayName: name });

      // Firestore に受験者情報を保存
      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        name,
        email,
        created_at: new Date()
      });

      alert("登録が完了しました！");
      window.location.href = "dashboard.html";

    } catch (error) {
      alert("登録エラー: " + error.message);
    }
  };
</script>

</body>
</html>

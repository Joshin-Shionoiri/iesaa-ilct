<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>パスワード再設定｜ILCT受験者ポータル</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family:"Yu Gothic"; background:#f5f7fb; margin:0; }
  .box { max-width:420px; margin:80px auto; background:#fff; padding:40px;
         border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.15); }
  h2 { text-align:center; color:#004b9b; margin-bottom:30px; }
  label { font-size:18px; margin-bottom:8px; display:block; }
  input { width:100%; padding:14px; font-size:18px; margin-bottom:20px;
          border:1px solid #ccc; border-radius:8px; }
  button { width:100%; padding:14px; background:#004b9b; color:#fff;
           font-size:20px; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="box">
  <h2>パスワード再設定</h2>

  <label>メールアドレス</label>
  <input id="email" type="email">

  <button id="resetBtn">再設定メールを送信</button>
</div>

<script type="module">
  import { auth } from "./firebase.js";
  import { sendPasswordResetEmail } 
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  document.getElementById("resetBtn").onclick = async () => {
    const email = document.getElementById("email").value;

    try {
      await sendPasswordResetEmail(auth, email);
      alert("パスワード再設定メールを送信しました。");
    } catch (error) {
      alert("エラー: " + error.message);
    }
  };
</script>

</body>
</html>
